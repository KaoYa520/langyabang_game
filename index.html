<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琅琊榜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: #0a0a0a;
            color: #f5f5f5;
            overflow: hidden;
            height: 100vh;
        }

        #game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 开始界面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 50%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .game-title {
            font-size: 4rem;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5), 0 0 60px rgba(212, 175, 55, 0.3);
            margin-bottom: 1rem;
            letter-spacing: 0.5rem;
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 3rem;
            letter-spacing: 0.3rem;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .menu-btn {
            padding: 1rem 3rem;
            font-size: 1.3rem;
            font-family: 'Noto Serif SC', serif;
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
            letter-spacing: 0.2rem;
        }

        .menu-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* 角色介绍界面 */
        #character-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            display: none;
            z-index: 999;
            overflow-y: auto;
        }

        #character-screen.active {
            display: block;
        }

        .character-header {
            text-align: center;
            padding: 2rem;
            border-bottom: 1px solid #333;
        }

        .character-header h2 {
            font-size: 2rem;
            color: #d4af37;
            letter-spacing: 0.3rem;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            z-index: 1001;
        }

        .back-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .character-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .character-card:hover {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.05);
        }

        .character-card .character-image {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #444;
            flex-shrink: 0;
            background: #1a1a2e;
            transition: all 0.3s ease;
        }

        .character-card:hover .character-image {
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .character-card .character-info {
            flex: 1;
            min-width: 0;
        }

        .character-card h3 {
            color: #d4af37;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #444;
            padding-bottom: 0.5rem;
        }

        .character-card .info-row {
            margin: 0.4rem 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .character-card .label {
            color: #888;
            display: inline-block;
            min-width: 70px;
        }

        .character-card .traits {
            color: #aaa;
            font-style: italic;
        }

        .character-card .description {
            color: #bbb;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid #333;
        }

        /* 阵营选择样式 */
        .camp-select {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
        }

        .camp-title {
            color: #d4af37;
            font-size: 1.5rem;
            letter-spacing: 0.3rem;
            margin-bottom: 2.5rem;
            font-family: 'Noto Serif SC', serif;
        }

        .camp-buttons {
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .camp-btn {
            width: 220px;
            padding: 2rem 1.5rem;
            border: 2px solid;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            font-family: 'Noto Serif SC', serif;
        }

        .camp-btn-ally {
            border-color: #5a9e6f;
        }

        .camp-btn-ally:hover {
            background: rgba(90, 158, 111, 0.15);
            box-shadow: 0 0 25px rgba(90, 158, 111, 0.3);
            transform: translateY(-3px);
        }

        .camp-btn-enemy {
            border-color: #c0392b;
        }

        .camp-btn-enemy:hover {
            background: rgba(192, 57, 43, 0.15);
            box-shadow: 0 0 25px rgba(192, 57, 43, 0.3);
            transform: translateY(-3px);
        }

        .camp-icon {
            font-size: 2.5rem;
        }

        .camp-label {
            font-size: 1.3rem;
            color: #d4af37;
            letter-spacing: 0.2rem;
        }

        .camp-count {
            font-size: 0.85rem;
            color: #888;
        }

        .camp-back-bar {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.5rem 0 1rem;
            border-bottom: 1px solid #333;
            margin-bottom: 1rem;
        }

        .camp-back-btn {
            padding: 0.5rem 1.2rem;
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .camp-back-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
        }

        .camp-back-title {
            color: #d4af37;
            font-size: 1.3rem;
            letter-spacing: 0.2rem;
        }

        /* 主游戏界面 */
        #game-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #game-screen.active {
            display: flex;
        }

        /* 顶部状态栏 */
        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #d4af37;
            font-weight: 600;
        }

        .stat-change {
            font-size: 0.8rem;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            margin-left: 0.3rem;
            animation: fadeUp 1.5s ease forwards;
        }

        .stat-change.positive {
            color: #4caf50;
            background: rgba(76, 175, 80, 0.2);
        }

        .stat-change.negative {
            color: #f44336;
            background: rgba(244, 67, 54, 0.2);
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; transform: translateY(-5px); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        /* 场景区域 */
        #scene-area {
            flex: 1;
            position: relative;
            display: flex;
            overflow: hidden;
        }

        /* 背景图 */
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s ease;
            z-index: 1;
        }

        #background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        /* 人物立绘区域 - 棠棣之华风格 */
        #character-left, #character-right {
            position: absolute;
            bottom: 0;
            height: 90%;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            pointer-events: none;
        }

        #character-left {
            left: 0;
            padding-left: 2%;
        }

        #character-right {
            right: 0;
            padding-right: 2%;
        }

        .character-sprite {
            max-height: 100%;
            max-width: 42vw;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.6));
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        .character-sprite.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .character-sprite.speaking {
            animation: breathe 3s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.3));
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.01); }
        }

        /* 章节标题 */
        #chapter-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #chapter-title.show {
            opacity: 1;
        }

        #chapter-title h2 {
            font-size: 2.5rem;
            color: #d4af37;
            letter-spacing: 0.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        #chapter-title p {
            font-size: 1rem;
            color: #aaa;
            letter-spacing: 0.2rem;
        }

        /* 底部文本框 - 棠棣之华风格毛玻璃效果 */
        #text-box {
            position: relative;
            z-index: 30;
            background: linear-gradient(180deg,
                rgba(20, 20, 30, 0.85) 0%,
                rgba(10, 10, 20, 0.92) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            padding: 1.8rem 2.5rem;
            min-height: 180px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        #text-box:hover {
            background: linear-gradient(180deg,
                rgba(25, 25, 35, 0.88) 0%,
                rgba(15, 15, 25, 0.95) 100%);
        }

        #speaker-name {
            font-size: 1.2rem;
            color: #d4af37;
            margin-bottom: 0.8rem;
            padding-left: 1rem;
            border-left: 4px solid #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            letter-spacing: 0.15rem;
            font-weight: 600;
        }

        #speaker-name.narration {
            color: #888;
            border-left-color: #666;
            text-shadow: none;
            font-style: italic;
        }

        #dialogue-text {
            font-size: 1.2rem;
            line-height: 2;
            color: #f5f5f5;
            padding-left: 1rem;
            min-height: 4rem;
            letter-spacing: 0.05rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* 选项区域 - 棠棣之华风格卡片 */
        #choices-container {
            position: absolute;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            display: none;
            flex-direction: column;
            gap: 1.2rem;
            width: 90%;
            max-width: 650px;
        }

        #choices-container.show {
            display: flex;
        }

        .choice-btn {
            padding: 1.2rem 2rem;
            background: linear-gradient(135deg,
                rgba(30, 30, 40, 0.95) 0%,
                rgba(20, 20, 30, 0.98) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 8px;
            color: #f0f0f0;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .choice-btn::before {
            content: '◆';
            position: absolute;
            left: 1rem;
            color: #d4af37;
            opacity: 0;
            transition: all 0.3s ease;
            transform: translateX(-10px);
        }

        .choice-btn:hover {
            border-color: #d4af37;
            background: linear-gradient(135deg,
                rgba(40, 40, 50, 0.95) 0%,
                rgba(30, 30, 40, 0.98) 100%);
            padding-left: 3rem;
            transform: translateX(5px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.2);
        }

        .choice-btn:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        .choice-btn:active {
            transform: translateX(5px) scale(0.98);
        }

        /* 数值变化提示 */
        #stat-changes {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 45;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            max-width: 80%;
            pointer-events: none;
        }

        .stat-change-popup {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
            animation: statPopup 2.5s ease forwards;
        }

        .stat-change-popup.positive {
            border-color: #4caf50;
            color: #4caf50;
        }

        .stat-change-popup.negative {
            border-color: #f44336;
            color: #f44336;
        }

        @keyframes statPopup {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* 点击提示 */
        #click-hint {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 0.85rem;
            color: #888;
            animation: pulse 1.5s ease infinite;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #click-hint::after {
            content: '▼';
            font-size: 0.7rem;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* 快进按钮 */
        #skip-btn {
            position: absolute;
            bottom: 15px;
            right: 120px;
            font-size: 0.8rem;
            color: #666;
            background: transparent;
            border: 1px solid #444;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
        }

        #skip-btn:hover {
            color: #d4af37;
            border-color: #d4af37;
        }

        /* BGM控制 */
        #bgm-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #bgm-btn {
            background: transparent;
            border: 1px solid #666;
            color: #888;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        #bgm-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        /* 结局画面 */
        #ending-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #ending-screen.active {
            display: flex;
        }

        .ending-title {
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 2rem;
        }

        .ending-text {
            font-size: 1.1rem;
            color: #ccc;
            max-width: 700px;
            text-align: center;
            line-height: 2;
            padding: 0 2rem;
        }

        .ending-stats {
            margin-top: 2rem;
            padding: 1.5rem;
            border: 1px solid #444;
            background: rgba(255,255,255,0.03);
        }

        .restart-btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .restart-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
        }

        /* 章节分隔线 */
        .divider {
            text-align: center;
            color: #666;
            margin: 2rem 0;
            letter-spacing: 1rem;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 开始界面 -->
        <div id="start-screen">
            <h1 class="game-title">琅琊榜</h1>
            <p class="game-subtitle">麒麟才子 · 得之可得天下</p>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="showCharacterScreen()">角色介绍</button>
                <button class="menu-btn" onclick="startGame()">开始游戏</button>
            </div>
        </div>

        <!-- 角色介绍界面 -->
        <div id="character-screen">
            <button class="back-btn" onclick="backToStart()">返回</button>
            <div class="character-header">
                <h2>角色介绍</h2>
            </div>
            <div class="character-grid" id="character-grid">
                <!-- 角色卡片由JS生成 -->
            </div>
        </div>

        <!-- BGM控制 -->
        <div id="bgm-control">
            <button id="bgm-btn" onclick="toggleBGM()">🎵 音乐: 关</button>
        </div>

        <!-- 主游戏界面 -->
        <div id="game-screen">
            <!-- 顶部状态栏 -->
            <div id="status-bar">
                <div class="stat-item">
                    <span class="stat-label">靖王信任:</span>
                    <span class="stat-value" id="trust-value">50</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">景睿好感:</span>
                    <span class="stat-value" id="jingrui-value">40</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">夏江怀疑:</span>
                    <span class="stat-value" id="suspicion-value">20</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">身体状态:</span>
                    <span class="stat-value" id="health-value">70</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">章节:</span>
                    <span class="stat-value" id="chapter-value">序章</span>
                </div>
            </div>

            <!-- 场景区域 -->
            <div id="scene-area" onclick="advanceDialogue()">
                <div id="background"></div>
                <div id="background-overlay"></div>

                <!-- 人物立绘 - 左右布局 -->
                <div id="character-left"></div>
                <div id="character-right"></div>

                <!-- 章节标题 -->
                <div id="chapter-title">
                    <h2 id="chapter-name"></h2>
                    <p id="chapter-subtitle"></p>
                </div>

                <!-- 数值变化提示 -->
                <div id="stat-changes"></div>

                <!-- 选项容器 -->
                <div id="choices-container"></div>
            </div>

            <!-- 底部文本框 -->
            <div id="text-box" onclick="advanceDialogue()">
                <div id="speaker-name"></div>
                <div id="dialogue-text"></div>
                <button id="skip-btn" onclick="event.stopPropagation(); skipToEnd()">快进 »</button>
                <div id="click-hint">点击继续</div>
            </div>
        </div>

        <!-- 结局画面 -->
        <div id="ending-screen">
            <h2 class="ending-title" id="ending-title"></h2>
            <div class="ending-text" id="ending-text"></div>
            <div class="ending-stats" id="ending-stats"></div>
